name: Main

on:
  push:
    branches:
      - master
      - action

jobs:
  uv-check:
    name: python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: "Install uv"
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"

      - name: "Install ruff and ty"
        run: uv tool install ruff && uv tool install ty
        
      - name: "Sync"
        run: uv sync --locked --all-extras --devt

      - name: "Ruff check"
        run: uv run ruff check

      - name: "Ty check"
        run: uv run ty check

